[project]
name = "rent-agent"
version = "0.1.0"
description = "租房 AI Agent - 智找安居·马年省心办"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.135",
    "httpx>=0.28",
    "uvicorn>=0.41",
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rent_agent"]

[project.scripts]
rent-agent = "rent_agent.main:run"
